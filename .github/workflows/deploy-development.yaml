name: deploy development


on:
  push:
    branches:
      - main


env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: wheelers-landing-dev
  REMOTE_HTTP_HOST: 127.0.0.1
  REMOTE_HTTP_PORT: 8001


jobs:

  landing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set variables
      run: |
        IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}"
        IMAGE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.ED25519_PRIVATE_KEY }}
        script: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

          docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

          docker run --detach \
          --name ${{ env.CONTAINER_NAME }} \
          --restart unless-stopped \
          --publish ${{ env.REMOTE_HTTP_HOST }}:${{ env.REMOTE_HTTP_PORT }}:8000 \
          -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
          -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
          -e SMTP_USER="${{ secrets.SMTP_USER }}" \
          -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
          -e SMTP_START_TLS="${{ secrets.SMTP_START_TLS }}" \
          -e SMTP_USE_TLS="${{ secrets.SMTP_USE_TLS }}" \
          -e MAIL_FROM="${{ secrets.MAIL_FROM }}" \
          -e CONTACT_TO="${{ secrets.CONTACT_TO }}" \
          ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          docker ps --filter name=${{ env.CONTAINER_NAME }}

          docker system prune --all --force

          echo "Deployment completed successfully!"
